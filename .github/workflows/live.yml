name: live

on:
  schedule:
    # Every 30 minutes during Kiev working hours (09-20 local, Mon-Fri).
    - cron: '*/30 6-18 * * 1-5'
  workflow_dispatch:

concurrency:
  group: live
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Kyiv
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CLOUD_ID: ${{ secrets.CLOUD_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Refresh live JSON
        run: pnpm live
      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(live): refresh'
          file_pattern: 'docs/data/**'
